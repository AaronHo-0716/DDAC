name: neighbourhelp

services:
  # PostgreSQL only (frontend/backend are not included yet)
  db:
    image: postgres:16-alpine
    container_name: neighbourhelp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neighbourhelp}
      POSTGRES_USER: ${POSTGRES_USER:-neighbourhelp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neighbourhelp_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
