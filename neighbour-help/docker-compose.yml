name: neighbourhelp-frontend

services:
  frontend:
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
    image: neighbour-help-frontend:latest
    container_name: neighbour-help-frontend
    ports:
      - "3000:3000"
    environment:
      # For server-side requests/rewrite destination resolution.
      # Use backend service DNS name when both run on the same Docker network.
      API_URL: ${API_URL:-http://backend:5000}
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
